services:
  customer-agent:
    build: .
    container_name: customer-agent
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DB_PATH: /app/data/complaints.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
